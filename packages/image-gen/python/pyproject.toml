[project]
name = "ellie-image-gen"
version = "0.1.0"
description = "Ellie image generation service — FastAPI wrapper around Diffusers"
requires-python = ">=3.10"
dependencies = [
	"fastapi>=0.115.0",
	"uvicorn[standard]>=0.34.0",
	"typer>=0.15.0",
	"diffusers>=0.32.0",
	"transformers>=4.48.0",
	"accelerate>=1.3.0",
	"torch>=2.5.0",
	"safetensors>=0.5.0",
	"huggingface_hub>=0.28.0",
	"requests>=2.32.0",
	"peft>=0.14.0",
	"ultralytics>=8.0.0",
	"torchsde>=0.2.5"
]

[project.scripts]
ellie-image-gen = "ellie_image_gen.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
